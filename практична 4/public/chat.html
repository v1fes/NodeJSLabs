<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/style.css">
    <title>Chat App</title>
</head>
<body>
<section>
    <div class="container-fluid">
        <div class="row">
            <div id="sidebar" class="col-4 vh-100 bg-info p-4" style="overflow-y: auto;">
            </div>

            <div id="chat" class="col-8 d-flex flex-column flex-grow-1 vh-100 p-0">
                <div id="messages" class="flex-grow-1" style="overflow-y: auto;">
                </div>
                
                <div id="typing-container" class="px-3" style="min-height: 24px;"></div>

                <div id="compose" class="p-3 bg-light">
                    <form id="message-form" class="form-inline">
                        <div class="form-group flex-grow-1">
                            <input type="text" name="message" class="form-control w-100" placeholder="Message (use @username: for private messages)" required autocomplete="off">
                        </div>
                        <div class="form-group ml-2">
                            <button class="btn btn-warning btn-lg">Send</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<script id="message-template" type="text/html">
    <div class="alert message {{bgClass}}">
        <div>
            <span class="message-name">{{username}}</span>
            <span class="message-meta">{{createdAt}}</span>
        </div>
        <div>{{message}}</div>
    </div>
</script>

<script id="sidebar-template" type="text/html">
    <div class="alert alert-primary">
        Room: <strong>{{room}}</strong><br>
        Username: <strong>{{currentUser}}</strong>
    </div>

    <ul class="list-group">
        <li class="list-group-item list-group-item-primary">Users in the chatroom</li>
        {{#users}}
        <li class="list-group-item">{{username}}</li>
        {{/users}}
    </ul>
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/3.1.0/mustache.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.24.0/moment-with-locales.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qs/6.9.1/qs.min.js"></script>

<script src="/socket.io/socket.io.js"></script>
<script>
    // elements
    const $messageForm = document.querySelector("#message-form")
    const $messageFormInput = $messageForm.querySelector("input[name='message']");
    const $messageFormButton = document.querySelector("button")
    const $messages = document.querySelector("#messages")
    const $typingContainer = document.querySelector("#typing-container")

    // Templates
    const messageTemplate = document.querySelector("#message-template").innerHTML
    const sidebarTemplate = document.querySelector('#sidebar-template').innerHTML

    // Options (Query string)
    const { username, room } = Qs.parse(location.search, { ignoreQueryPrefix: true })

    const socket = io();

    // Auto-scrolling to bottom
    const autoscroll = () => {
        $messages.scrollTop = $messages.scrollHeight;
    }

    socket.on('message', (message) => {
        let bgClass = 'bg-warning text-dark'
        if (message.username === username.toLowerCase()) {
            bgClass = 'bg-success text-white pull-right'
        } else if (message.username === 'Admin') {
            bgClass = 'bg-info text-white'
        } else if (message.username.includes('Private')) {
            bgClass = 'bg-secondary text-white'
        }

        const html = Mustache.render(messageTemplate, {
            username: message.username,
            message: message.text,
            bgClass: bgClass,
            createdAt: moment(message.createdAt).format('h:mm a')
        })
        $messages.insertAdjacentHTML('beforeend', html)
        autoscroll()
    })

    socket.on('roomData', ({ room, users }) => {
        const html = Mustache.render(sidebarTemplate, {
            room,
            currentUser: username,
            users
        })
        document.querySelector('#sidebar').innerHTML = html
    })

    let typingTimeout;
    socket.on('userIsTyping', (typingUsername) => {
        $typingContainer.innerHTML = `<em class="text-muted">${typingUsername} is typing...</em>`;
        autoscroll();

        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            $typingContainer.innerHTML = '';
        }, 2000);
    });

    $messageFormInput.addEventListener('input', () => {
        socket.emit('userIsTyping');
    });

    $messageForm.addEventListener('submit', (e) => {
        e.preventDefault()

        $messageFormButton.setAttribute('disabled', 'disabled')

        const message = e.target.elements.message.value

        socket.emit('sendMessage', message, (error) => {
            $messageFormButton.removeAttribute('disabled')
            $messageFormInput.value = ''
            $messageFormInput.focus()

            if (error) {
                return alert(error)
            }
        })
    })

    socket.emit('join', { username, room }, (error) => {
        if (error) {
            alert(error)
            location.href = '/'
        }
    })
</script>
</body>
</html>
